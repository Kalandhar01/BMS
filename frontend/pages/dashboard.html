<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Dashboard – MovieHub</title><link rel="stylesheet" href="../css/base/variables.css"><link rel="stylesheet" href="../css/base/reset.css"><link rel="stylesheet" href="../css/base/typography.css"><link rel="stylesheet" href="../css/components/navbar.css"><link rel="stylesheet" href="../css/components/cards.css"><link rel="stylesheet" href="../css/components/buttons.css"><link rel="stylesheet" href="../css/components/toast.css"></head><body><header class="navbar" id="navbar"><div class="navbar__container"><div class="navbar__left"><a href="../index.html" class="navbar__logo"><span class="logo-icon"><svg width="28" height="28" viewBox="0 0 28 28" fill="none"><circle cx="14" cy="14" r="14" fill="#E63946"/><path d="M9 10L19 14L9 18V10Z" fill="white"/></svg></span><span class="logo-text">Movie<span class="logo-accent">Hub</span></span></a></div></div></header><main class="section section__container" style="padding-top:var(--space-16)"><h1>Dashboard</h1><div class="movie-grid" id="moviesGrid"></div></main><script type="module">import { API, ApiClient, MOCK_MOVIES } from '../js/api/config.js'; const grid=document.getElementById('moviesGrid'); try{const movies=await ApiClient.get(API.MOVIES.ALL,false); grid.innerHTML=movies.map(m=>`<div class="movie-card"><h3>${m.title}</h3><p>${m.genre||''}</p></div>`).join('')}catch{grid.innerHTML=MOCK_MOVIES.map(m=>`<div class="movie-card"><h3>${m.title}</h3><p>${m.genre?.[0]||''}</p></div>`).join('')}</script></body></html>
